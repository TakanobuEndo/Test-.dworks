<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アクセス制限</title>
</head>
<body style="background-color: #f3f4f6; margin: 0;">
    <script>
        // パスワードを「password123」に設定しています。
        var password = prompt("パスワードを入力してください:");
        
        if (password === "password123") {
            // 正解の場合、先ほど確認できた確実なURLへ直接ジャンプさせます
            window.location.href = "https://takanobuendo.github.io/Test-.dworks/";
        } else {
            alert("パスワードが違います。");
            window.location.reload();
        }
    </script>
</body>
</html>
