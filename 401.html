<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アクセス制限</title>
</head>
<body style="background-color: #f3f4f6; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;">
    <script>
        // 「password123」の部分を、あなたの好きなパスワード（半角英数字）に変更してください
        var password = prompt("パスワードを入力してください:");
        if (password === "panasonic") {
            // 正解ならトップページ（index.html）へ進む
            window.location.href = "index.html"; 
        } else {
            alert("パスワードが違います。");
            window.location.reload();
        }
    </script>
</body>
</html>
