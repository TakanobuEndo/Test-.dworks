        const extension = String(name || "").split(".").pop()?.toUpperCase();
        if (extension && extension !== name) return extension;
        if (type?.includes("pdf")) return "PDF";
        if (type?.includes("image")) return "IMG";
        if (type?.includes("sheet") || type?.includes("excel")) return "XLS";
        if (type?.includes("document") || type?.includes("word")) return "DOC";
        return "FILE";
      }
      function addDays(date, days) {
        const next = new Date(date);
        next.setDate(next.getDate() + days);
        return next;
      }
      function daysBetween(start, end) {
        const startDate = new Date(start);
        const endDate = new Date(end);
        return Math.round((endDate - startDate) / 86400000);
      }
      function taskCreator(task) {
        return task.activity?.[0]?.actor === "ai-batch" ? member("ken") : member(task.assignees[0]);
      }
      const dueDaysByPriority = { P0: 1, P1: 3, P2: 6, P3: 10 };
      const durationByPriority = { P0: 2, P1: 4, P2: 6, P3: 9 };
      function taskStartDate(task) {
        return new Date(task.created_at);
      }
      function taskDueDate(task) {
        const duration = durationByPriority[task.priority] || 6;
        const urgency = dueDaysByPriority[task.priority] || 6;
        const base = addDays(taskStartDate(task), Math.max(duration, urgency));
        if (task.status === "done") return new Date(task.updated_at);
        if (task.status === "blocked") return addDays(base, 3);
        return base;
      }
      function taskDurationDays(task) {
        return Math.max(1, daysBetween(taskStartDate(task), taskDueDate(task)) + 1);
      }
      function dueTone(task) {
        const remaining = daysBetween(now, taskDueDate(task));
        if (task.status === "done") return "text-[#137333]";
        if (remaining < 0) return "text-[#c5221f]";
        if (remaining <= 2) return "text-[#b06000]";
        return "text-[#5f6368]";
      }
      function nextId(tasks, archive) {
        const max = [...tasks, ...archive].reduce((acc, task) => Math.max(acc, Number(task.id.replace("T", "")) || 0), 0);
        return `T${String(max + 1).padStart(4, "0")}`;

      function commentReactions(total, commentCount, index) {

        if (count === 1) return [{ ...first, count }];
        const second = reactionPalette[(index + 2) % reactionPalette.length];
        const firstCount = Math.ceil(count / 2);
        return [
          { ...first, count: firstCount },
          { ...second, count: count - firstCount },

      function GanttView({ tasks, selectedId, onSelect }) {
        const dayWidth = 44;
        const timelineDays = 28;
        const baseDate = tasks.length
          ? addDays(new Date(Math.min(...tasks.map((task) => taskStartDate(task).getTime()))), -1)
          : addDays(now, -7);
        const days = Array.from({ length: timelineDays }, (_, index) => addDays(baseDate, index));
        const timelineWidth = dayWidth * timelineDays;
        if (tasks.length === 0) {
          return <div className="mt-4 rounded-2xl border border-dashed border-[#dadce0] bg-[#f8fafd] p-8 text-center text-sm text-[#5f6368]">該当ワークがありません。</div>;
        }
        return (
          <div className="mt-4 overflow-hidden rounded-2xl border border-[#e8eaed]">
            <div className="flex flex-wrap items-center justify-between gap-3 border-b border-[#e8eaed] bg-[#f8fafd] px-4 py-3">
              <div>
                <div className="text-sm font-medium text-[#202124]">ガント</div>
                <div className="text-xs text-[#5f6368]">開始日は作成日、期日は優先度と進捗から推論。バークリックで詳細を表示</div>
              </div>
              <div className="flex flex-wrap items-center gap-2 text-xs text-[#5f6368]">
                <Chip className="bg-white text-[#5f6368] ring-1 ring-[#e8eaed]">{formatDate(days[0])} - {formatDate(days[days.length - 1])}</Chip>
                <span className="inline-flex items-center gap-1"><span className="h-2.5 w-4 rounded-full bg-[#e8f0fe] ring-1 ring-[#d2e3fc]" />通常</span>
                <span className="inline-flex items-center gap-1"><span className="h-2.5 w-4 rounded-full bg-[#fef7e0] ring-1 ring-[#feefc3]" />人間確認</span>
                <span className="inline-flex items-center gap-1"><span className="h-2.5 w-4 rounded-full bg-[#fce8e6] ring-1 ring-[#fad2cf]" />停滞</span>
              </div>
            </div>
            <div className="overflow-x-auto">
              <div className="min-w-[1180px]">
                <div className="grid border-b border-[#e8eaed] text-xs font-medium text-[#5f6368]" style={{ gridTemplateColumns: `560px ${timelineWidth}px` }}>
                  <div className="sticky left-0 z-10 grid grid-cols-[1fr_92px_72px] gap-2 bg-white px-4 py-3 shadow-[1px_0_0_#e8eaed]">
                    <span>ワーク名</span>
                    <span>期日</span>
                    <span>期間</span>
                  </div>
                  <div className="grid bg-white" style={{ gridTemplateColumns: `repeat(${timelineDays}, ${dayWidth}px)` }}>
                    {days.map((day) => (
                      <div key={day.toISOString()} className={cn("border-l border-[#f1f3f4] px-1 py-3 text-center", day.getDay() === 0 || day.getDay() === 6 ? "bg-[#f8fafd]" : "")}>{formatDate(day)}</div>
                    ))}
                  </div>
                </div>
                {tasks.map((task) => {
                  const meta = statusMeta[task.status];
                  const startOffset = Math.max(0, daysBetween(baseDate, taskStartDate(task)));
                  const duration = Math.min(timelineDays - startOffset, Math.max(1, taskDurationDays(task)));
                  const ganttTone = {
                    "needs-ai": "bg-[#e8f0fe] text-[#1967d2] ring-[#d2e3fc]",
                    "needs-human": "bg-[#fef7e0] text-[#b06000] ring-[#feefc3]",
                    "in-progress": "bg-[#e6f4ea] text-[#137333] ring-[#ceead6]",
                    reviewing: "bg-[#f3e8fd] text-[#8430ce] ring-[#e9d2fd]",
                    done: "bg-[#f1f3f4] text-[#5f6368] ring-[#e8eaed]",
                    blocked: "bg-[#fce8e6] text-[#c5221f] ring-[#fad2cf]",
                  }[task.status] || "bg-[#e8f0fe] text-[#1967d2] ring-[#d2e3fc]";
                  return (
                    <div
                      key={task.id}
                      onClick={() => onSelect(task.id)}
                      className={cn("grid min-h-[64px] cursor-pointer border-b border-[#f1f3f4] bg-white transition hover:bg-[#f8fafd]", selectedId === task.id ? "bg-[#e8f0fe]/60" : "")}
                      style={{ gridTemplateColumns: `560px ${timelineWidth}px` }}
                    >
                      <div className="sticky left-0 z-10 grid grid-cols-[1fr_92px_72px] items-center gap-2 bg-inherit px-4 py-3 shadow-[1px_0_0_#e8eaed]">
                        <div className="min-w-0 pr-4">
                          <div className="flex min-w-0 items-center gap-2">
                            <span className="shrink-0 rounded-full bg-[#f1f3f4] px-2 py-0.5 text-xs font-medium text-[#5f6368]">{task.id}</span>
                            <div className="line-clamp-1 min-w-0 text-[15px] font-medium leading-6 text-[#202124]" title={task.title}>{task.title}</div>
                          </div>
                        </div>
                        <span className={cn("text-sm font-medium", dueTone(task))}>{formatDate(taskDueDate(task))}</span>
                        <span className="text-sm text-[#5f6368]">{taskDurationDays(task)}日</span>
                      </div>
                      <div className="relative" style={{ width: `${timelineWidth}px` }}>
                        <div className="absolute inset-0 grid" style={{ gridTemplateColumns: `repeat(${timelineDays}, ${dayWidth}px)` }}>
                          {days.map((day) => <div key={`${task.id}-${day.toISOString()}`} className={cn("border-l border-[#f1f3f4]", day.getDay() === 0 || day.getDay() === 6 ? "bg-[#f8fafd]" : "")} />)}
                        </div>
                        <div
                          className={cn("absolute top-5 h-6 rounded-full shadow-sm ring-1", ganttTone)}
                          style={{ left: `${startOffset * dayWidth + 8}px`, width: `${Math.max(36, duration * dayWidth - 12)}px` }}
                          title={`${task.title}: ${formatDate(taskStartDate(task))} - ${formatDate(taskDueDate(task))}`}
                        />
                        <div className={cn("absolute top-[23px] truncate px-3 text-xs font-medium", ganttTone.split(" ").find((token) => token.startsWith("text-")))} style={{ left: `${startOffset * dayWidth + 8}px`, width: `${Math.max(36, duration * dayWidth - 12)}px` }}>
                          {duration >= 3 ? task.title : ""}
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        );
      }

      function ShopView({ query, selectedTask, ownedItems, onPurchase, onSendStamp }) {
        const tabs = [
          { key: "skills", label: "スキル", description: "専門家・共同作業者を召喚" },
          { key: "commons", label: "コモンズ", description: "場所・素材・自然資源を予約" },
          { key: "stamps", label: "スタンプ", description: "1,000Pointの感謝パック" },
        ];
        const sortOptionsByType = {
          skills: [
            { key: "fit", label: "適合" },
            { key: "price", label: "価格" },
            { key: "rating", label: "評価" },
            { key: "likes", label: "♡" },
            { key: "reviews", label: "レビュー" },
          ],
          commons: [
            { key: "fit", label: "適合" },
            { key: "price", label: "価格" },
            { key: "capacity", label: "定員" },
            { key: "rating", label: "評価" },
            { key: "likes", label: "♡" },
          ],
          stamps: [
            { key: "likes", label: "人気" },
            { key: "price", label: "価格" },
            { key: "rating", label: "評価" },
            { key: "points", label: "Point" },
            { key: "reviews", label: "レビュー" },
          ],
        };
        const [activeType, setActiveType] = useState("skills");
        const [sort, setSort] = useState({ key: "fit", dir: "desc" });
        const [selectedItemId, setSelectedItemId] = useState(shopCatalog.skills[0].id);
        const queryText = query.trim().toLowerCase();
        const items = shopCatalog[activeType] || [];
        function numericText(value) {
          const matched = String(value || "").match(/\d+/);
          return matched ? Number(matched[0]) : 0;
        }
        function sortValue(item, key) {
          if (key === "price") return item.price;
          if (key === "rating") return item.rating;
          if (key === "likes") return item.likes;
          if (key === "reviews") return item.reviews;
          if (key === "fit") return item.fit;
          if (key === "capacity") return numericText(item.capacity);
          if (key === "points") return stampPointTotal(item);
          return item.name;
        }
        function changeType(key) {
          setActiveType(key);
          setSelectedItemId(shopCatalog[key][0]?.id || "");
          setSort({ key: key === "stamps" ? "likes" : "fit", dir: "desc" });
        }
        function toggleSort(key) {
          setSort((current) => current.key === key ? { key, dir: current.dir === "asc" ? "desc" : "asc" } : { key, dir: key === "price" ? "asc" : "desc" });
        }
        const visibleItems = items
          .filter((item) => {
            if (!queryText) return true;
            return `${item.name} ${item.subtitle} ${item.provider} ${item.location} ${item.tags.join(" ")} ${item.review}`.toLowerCase().includes(queryText);
          })
          .sort((a, b) => {
            const av = sortValue(a, sort.key);
            const bv = sortValue(b, sort.key);
            if (typeof av === "string") return sort.dir === "asc" ? av.localeCompare(bv) : bv.localeCompare(av);
            return sort.dir === "asc" ? av - bv : bv - av;
          });
        const selectedItem = items.find((item) => item.id === selectedItemId) || visibleItems[0] || items[0];
        const activeTab = tabs.find((tab) => tab.key === activeType);

        return (
          <div className="mt-4 min-h-[720px]">
            <div className="rounded-2xl border border-[#e8eaed] bg-[#f8fafd] p-3">
              <div className="flex flex-col gap-3 xl:flex-row xl:items-center xl:justify-between">
                <div>
                  <div className="flex items-center gap-2 text-sm font-semibold text-[#202124]"><Icon name="shop" className="h-4 w-4 text-[#1a73e8]" />ストア</div>
                  <div className="mt-1 text-xs leading-5 text-[#5f6368]">
                    {activeTab.description}。現在の適用先: <span className="font-medium text-[#202124]">{selectedTask ? `${selectedTask.id} ${selectedTask.title}` : "ワーク未選択"}</span>
                  </div>
                </div>
                <div className="flex flex-wrap items-center gap-2">
                  {tabs.map((tab) => (
                    <button
                      key={tab.key}
                      onClick={() => changeType(tab.key)}
                      className={cn(
                        "inline-flex h-10 items-center gap-2 rounded-full border px-4 text-sm font-medium transition",
                        activeType === tab.key ? "border-[#d2e3fc] bg-[#e8f0fe] text-[#1967d2]" : "border-[#dadce0] bg-white text-[#5f6368] hover:bg-[#f8fafd]"
                      )}
                    >
                      {tab.label}
                      <span className="rounded-full bg-white px-2 py-0.5 text-xs text-[#5f6368]">{shopCatalog[tab.key].length}</span>
                    </button>
                  ))}
                </div>
              </div>
              <div className="mt-3 flex flex-wrap items-center gap-2 border-t border-[#e8eaed] pt-3">
                <span className="text-xs font-medium text-[#5f6368]">並び替え</span>
                {sortOptionsByType[activeType].map((option) => (
                  <SortButton key={option.key} option={option} sort={sort} onClick={() => toggleSort(option.key)} />
                ))}
              </div>
            </div>

            <div className="mt-3 grid gap-3 xl:grid-cols-[minmax(0,1fr)_380px]">
              <div className="overflow-hidden rounded-2xl border border-[#e8eaed] bg-white">
                <div className="overflow-x-auto">
                  <table className="min-w-[1440px] table-fixed border-collapse text-left text-sm">
                    <thead className="bg-white text-xs font-medium text-[#5f6368]">
                      <tr className="border-b border-[#e8eaed]">
                        <th className="w-[390px] px-4 py-3">{activeType === "commons" ? "場所・資源" : activeType === "stamps" ? "パック" : "スキルセット"}</th>
                        <th className="w-[190px] px-3 py-3">{activeType === "skills" ? "名前" : activeType === "stamps" ? "Original" : "提供元"}</th>
                        <th className="w-[260px] px-3 py-3">{activeType === "commons" ? "用途・設備" : activeType === "stamps" ? "テーマ" : "専門スキル"}</th>
                        <th className="w-[130px] px-3 py-3">価格</th>
                        <th className="w-[130px] px-3 py-3">{activeType === "commons" ? "予約単位" : activeType === "stamps" ? "Point" : "期間"}</th>
                        <th className="w-[140px] px-3 py-3">{activeType === "commons" ? "定員" : activeType === "stamps" ? "内容" : "稼働時間"}</th>
                        <th className="w-[170px] px-3 py-3">評価・信頼度（%）</th>
                        <th className="w-[168px] px-3 py-3">操作</th>
                      </tr>
                    </thead>
                    <tbody>
                      {visibleItems.map((item, index) => (
                        <ShopRow
                          key={item.id}
                          item={item}
                          promoted={index === 0}
                          active={selectedItem?.id === item.id}
                          owned={ownedItems.includes(item.id)}
                          onSelect={() => setSelectedItemId(item.id)}
                          onPurchase={onPurchase}
                        />
                      ))}
                    </tbody>
                  </table>
                  {visibleItems.length === 0 && (
                    <div className="p-8 text-center text-sm text-[#5f6368]">該当するストア商品がありません。</div>
                  )}
                </div>
              </div>
              <ShopDetailPanel
                item={selectedItem}
                selectedTask={selectedTask}
                owned={selectedItem ? ownedItems.includes(selectedItem.id) : false}
                onPurchase={onPurchase}
                onSendStamp={onSendStamp}
              />
            </div>
          </div>
        );
      }

      function SortButton({ option, sort, onClick }) {
        const active = sort.key === option.key;
        return (
          <button
            onClick={onClick}
            className={cn(
              "inline-flex h-8 items-center gap-1 rounded-full border px-3 text-xs font-medium transition",
              active ? "border-[#d2e3fc] bg-white text-[#1967d2]" : "border-[#dadce0] bg-white text-[#5f6368] hover:bg-[#f8fafd]"
            )}
            title={`${option.label}で${active && sort.dir === "asc" ? "降順" : "昇順"}に並び替え`}
          >
            {option.label}
            <span className="text-[10px]">{active ? (sort.dir === "asc" ? "▲" : "▼") : "↕"}</span>
          </button>
        );
      }

      function ShopRow({ item, active, owned, promoted, onSelect, onPurchase }) {
        const isStamp = item.type === "stamps";
        const isSkill = item.type === "skills";

      function ShopDetailPanel({ item, selectedTask, owned, onPurchase, onSendStamp }) {

        const isStamp = item.type === "stamps";
        const isSkill = item.type === "skills";
        const emotes = shopEmotes(item);
        const detailSections = shopDetailSections(item);
        return (
          <aside className="rounded-2xl border border-[#e8eaed] bg-white p-4">

                <p className="mt-1 text-sm leading-6 text-[#5f6368]">{item.subtitle}</p>

            <div className="mt-4 grid grid-cols-2 gap-2">
              <ShopMiniMetric label="価格" value={formatYen(item.price)} />

                        <span className={cn(

                      <div className="mt-1 break-all text-xs leading-5 text-[#5f6368]">{link.url}</div>
                    </a>

              <Icon name={owned ? "check" : "shop"} className="h-3.5 w-3.5 shrink-0" />

            </button>
          </aside>

      function ShopMiniMetric({ label, value }) {
        return (
          <div className="rounded-xl bg-[#f8fafd] p-3">
            <div className="text-[11px] font-medium text-[#5f6368]">{label}</div>
            <div className="mt-1 truncate text-sm font-semibold text-[#202124]">{value}</div>
          </div>
        );
      }

      function StampPointGrid({ emotes, owned, onSend }) {
        return (
          <div className="mt-4">
            <div className="mb-2 flex items-center justify-between gap-2">
              <div className="text-xs font-medium text-[#5f6368]">Emote Point</div>
              <div className="rounded-full bg-[#f1f3f4] px-2 py-0.5 text-xs font-medium text-[#5f6368]">合計 {emotes.reduce((total, emote) => total + emote.points, 0).toLocaleString()}P</div>
            </div>
            <div className="grid grid-cols-5 gap-1.5">
              {emotes.map((emote, index) => (
                <button
                  key={`${emote.icon}-${index}`}
                  disabled={!owned}
                  onClick={() => onSend(emote)}
                  className={cn(
                    "relative grid h-14 place-items-center rounded-xl border pt-1 text-lg transition",
                    owned ? "border-[#d2e3fc] bg-white hover:bg-[#e8f0fe]" : "cursor-not-allowed border-[#e8eaed] bg-[#f8fafd] opacity-60"
                  )}
                  title={owned ? `${emote.points}Point送る` : "購入後に送信できます"}

                  <span>{emote.icon}</span>

                  <span className={cn("absolute bottom-1 left-1 text-[10px] font-medium leading-none", owned ? "text-[#1967d2]" : "text-[#5f6368]")}>{owned ? "送る" : "購入後"}</span>
                </button>
              ))}
            </div>
          </div>
        );

      function Panel({ title, children, danger = false }) {
        return (
          <section className={cn("rounded-2xl border p-3", danger ? "border-[#fad2cf] bg-[#fce8e6]" : "border-[#e8eaed] bg-white")}>
            <div className="mb-2 text-xs font-medium uppercase tracking-normal text-[#5f6368]">{title}</div>
            {children}
          </section>
        );
      }

      function AttachmentInput({ inputId, onFiles }) {
        return (
          <input
            id={inputId}
            type="file"
            multiple
            className="hidden"
            onChange={(event) => {
              const files = Array.from(event.target.files || []);
              if (files.length) onFiles(files);
              event.target.value = "";
            }}
          />
        );
      }

      function AttachmentAddButton({ inputId, compact = false }) {
        return (
          <label
            htmlFor={inputId}
            className={cn(
              "inline-flex cursor-pointer items-center justify-center rounded-full border border-[#dadce0] bg-white font-medium text-[#3c4043] shadow-sm transition hover:border-[#d2e3fc] hover:bg-[#f8fafd] hover:text-[#1967d2]",
              compact ? "gap-1 px-3 py-1.5 text-xs" : "gap-1 px-3 py-2 text-xs"
            )}
          >
            <Icon name="plus" className="h-3.5 w-3.5" />
            ファイルを追加
          </label>
        );
      }

      function TaskAttachments({ task, onAddFiles, onRemoveFile }) {
        const attachments = task.attachments || [];
        const inputId = `attachment-input-${task.id}`;
        return (
          <Panel title="添付ファイル">
            <AttachmentInput inputId={inputId} onFiles={onAddFiles} />
            {attachments.length === 0 ? (
              <div className="rounded-xl border border-dashed border-[#dadce0] bg-[#f8fafd] px-2.5 py-2">
                <div className="flex items-center gap-2">
                  <div className="grid h-8 w-8 shrink-0 place-items-center rounded-xl bg-white text-[#1967d2] ring-1 ring-[#d2e3fc]">
                    <Icon name="file" className="h-4 w-4" />
                  </div>
                  <p className="min-w-0 flex-1 text-xs leading-5 text-[#5f6368]">議事録、見積、画像、参考資料などを紐づけます。</p>
                  <div className="shrink-0">
                    <AttachmentAddButton inputId={inputId} compact />
                  </div>
                </div>
              </div>
            ) : (
              <div className="space-y-2">
                <div className="space-y-2">
                  {attachments.map((file) => (
                    <div key={file.id} className="flex items-center gap-2 rounded-xl border border-[#e8eaed] bg-[#f8fafd] p-2">
                      <div className="group relative grid h-10 w-10 shrink-0 place-items-center rounded-xl bg-white text-[#1967d2] ring-1 ring-[#d2e3fc]">
                        <Icon name="file" className="h-4 w-4" />
                        <button
                          type="button"
                          onClick={() => onRemoveFile(file.id)}
                          className="absolute -right-2 top-1/2 grid h-6 w-6 -translate-y-1/2 place-items-center rounded-full bg-white text-sm font-semibold leading-none text-[#5f6368] opacity-0 shadow-sm ring-1 ring-[#dadce0] transition group-hover:opacity-100 focus:opacity-100 hover:bg-[#fce8e6] hover:text-[#c5221f] hover:ring-[#fad2cf]"
                          title={`${file.name} を削除`}
                          aria-label={`${file.name} を削除`}
                        >
                          ×
                        </button>
                      </div>
                      <div className="min-w-0 flex-1">
                        <div className="line-clamp-1 text-sm font-medium text-[#202124]" title={file.name}>{file.name}</div>
                        <div className="mt-1 flex flex-wrap items-center gap-1.5 text-xs text-[#5f6368]">
                          <span className="rounded-full bg-white px-2 py-0.5 font-medium ring-1 ring-[#e8eaed]">{fileKind(file.name, file.type)}</span>
                          <span>{formatFileSize(file.size)}</span>
                          <span>追加: {file.addedBy}</span>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
                <div className="mt-3 flex justify-end">
                  <AttachmentAddButton inputId={inputId} compact />
                </div>
              </div>
            )}
          </Panel>
        );
      }

      function Detail({ task, activeTag, onTagSelect, onPatch, onComplete, ownedStampItems, onAddCommentStamp }) {
        const meta = statusMeta[task.status];
        function handleAttachmentFiles(files) {
          const addedAt = now.toISOString();
          const nextAttachments = files.map((file, index) => ({
            id: `${task.id}-file-${Date.now()}-${index}`,
            name: file.name,
            size: file.size,
            type: file.type,
            source: "device",
            addedBy: "Entaka",
            addedAt,
          }));
          onPatch(task.id, { attachments: [...(task.attachments || []), ...nextAttachments] }, "添付ファイルを追加");
        }
        function handleRemoveAttachment(fileId) {
          onPatch(task.id, { attachments: (task.attachments || []).filter((file) => file.id !== fileId) }, "添付ファイルを削除");
        }
        return (
          <div className="flex h-full min-h-[720px] flex-col">
            <div className="border-b border-[#e8eaed] p-5">
              <div className="flex items-start justify-between gap-3">

                </div>
                <button onClick={() => onComplete(task.id)} className="grid h-10 w-10 shrink-0 place-items-center rounded-full text-[#5f6368] transition hover:bg-[#e8f0fe] hover:text-[#1967d2]" title="完了列へ移動">
                  <Icon name="check" className="h-4 w-4" />

                <Chip className={priorityMeta[task.priority].tone}>{task.priority} {priorityMeta[task.priority].label}</Chip>
              </div>
            </div>
            <div className="flex-1 overflow-y-auto p-4">
              <div className="space-y-4">
                <Panel title="引継ぎノート"><p className="text-sm leading-7 text-[#3c4043]">{task.handoff_note}</p></Panel>
                <TaskAttachments task={task} onAddFiles={handleAttachmentFiles} onRemoveFile={handleRemoveAttachment} />
                {task.blocked_reason && <Panel title="停滞理由" danger><p className="text-sm leading-7 text-[#c5221f]">{task.blocked_reason}</p></Panel>}
                <Panel title="ステータス">
                  <div className="grid grid-cols-2 gap-2">
                    <ActionButton icon="bot" label="AIへ戻す" onClick={() => onPatch(task.id, { status: "needs-ai", owner: "ai-batch", blocked_reason: null }, "AI処理待ちへ変更")} />
                    <ActionButton icon="user" label="人間確認" onClick={() => onPatch(task.id, { status: "needs-human", owner: "human", blocked_reason: null }, "人間確認待ちへ変更")} />
                    <ActionButton icon="play" label="処理開始" onClick={() => onPatch(task.id, { status: "in-progress", blocked_reason: null }, "処理開始")} />
                    <ActionButton icon="search" label="レビュー開始" onClick={() => onPatch(task.id, { status: "reviewing", owner: "human", blocked_reason: null }, "レビュー中へ変更")} />
                    <ActionButton icon="check" label="完了する" onClick={() => onComplete(task.id)} />
                    <ActionButton icon="pause" label="停滞にする" onClick={() => onPatch(task.id, { status: "blocked", blocked_reason: "判断材料が不足" }, "停滞に変更")} />
                  </div>
                </Panel>
                <Panel title="共同作業中">
                  <div className="flex items-center justify-between gap-3">
                    <div className="flex -space-x-2">{task.assignees.map((id) => <Avatar key={id} id={id} size="md" />)}</div>
                    <div className="flex items-center gap-4">
                      <SocialCount icon="heart" value={task.thanks_count} />
                      <SocialCount icon="message" value={task.comments_count} />
                    </div>
                  </div>
                  <div className="mt-3 flex flex-wrap gap-2">
                    {task.assignees.map((id) => <Chip key={id} className="bg-[#f1f3f4] text-[#3c4043]"><Avatar id={id} />{member(id).name}</Chip>)}
                  </div>
                </Panel>
                <CommentList key={task.id} task={task} ownedStampItems={ownedStampItems} onAddStamp={onAddCommentStamp} />
                <Panel title="ワークタグ">
                  <div className="flex flex-wrap gap-2">
                    {task.tags.map((tag) => (
                      <button
                        key={tag}
                        onClick={() => onTagSelect(tag)}
                        className={cn(
                          "rounded-full px-2 py-1 text-xs font-medium transition",
                          activeTag === tag ? "bg-[#e8f0fe] text-[#1967d2] ring-1 ring-[#d2e3fc]" : "bg-[#f1f3f4] text-[#5f6368] hover:bg-[#e8eaed]"

                <Panel title="履歴ログ">

                    </div>

                </Panel>
              </div>
            </div>
          </div>
        );

      function ActionButton({ icon, label, onClick }) {
        return (
          <button onClick={onClick} className="inline-flex min-h-10 items-center justify-center gap-2 rounded-full border border-[#dadce0] bg-white px-3 py-2 text-sm font-medium text-[#3c4043] transition hover:bg-[#f8fafd]">
            <Icon name={icon} className="h-4 w-4" />
            {label}

              </div>

              {expanded && (

      function App() {
        const [tasks, setTasks] = useState(seedTasks);
        const [archive, setArchive] = useState([]);
        const [selectedId, setSelectedId] = useState(seedTasks[0].id);
        const [query, setQuery] = useState("");
        const [statusFilter, setStatusFilter] = useState("all");
        const [viewMode, setViewMode] = useState("board");
        const [shopPurchases, setShopPurchases] = useState([]);
        const [activeTag, setActiveTag] = useState("");
        const [profilePopup, setProfilePopup] = useState(null);
        const [draftTitle, setDraftTitle] = useState("");
        const [draftPriority, setDraftPriority] = useState("P2");
        const [detailOpen, setDetailOpen] = useState(true);
        const [detailWidth, setDetailWidth] = useState(380);
        const [navExpanded, setNavExpanded] = useState(false);
        const [activeMenu, setActiveMenu] = useState("work");
        const [currentProjectId, setCurrentProjectId] = useState("awai");
        const [loginId, setLoginId] = useState("");
        const [loginPassword, setLoginPassword] = useState("");
        const [currentUserId, setCurrentUserId] = useState(null);
        const [activeBottomNav, setActiveBottomNav] = useState("board");
        const [mobileSheetOpen, setMobileSheetOpen] = useState(false);
        const [createSheetOpen, setCreateSheetOpen] = useState(false);
        const [storeQuery, setStoreQuery] = useState("");
        const [log, setLog] = useState(["07:30 GET /api/board -> 10 tasks", "07:30 finance blocked -> T0004", "07:30 review queue -> 2 tasks", "07:30 next executable -> T0003"]);
        const currentUser = currentUserId ? member(currentUserId) : null;
        const visibleMembers = currentUser ? [currentUser, ...members.filter((item) => item.id !== currentUser.id)].slice(0, 4) : members.slice(0, 4);
        const extraMemberCount = Math.max(0, members.length - visibleMembers.length);
        const currentProject = projects.find((project) => project.id === currentProjectId) || projects[0];
        const currentProjectName = currentProject.name;

        const selected = tasks.find((task) => task.id === selectedId) || tasks[0];
        const showTaskDetail = detailOpen && viewMode !== "shop";
        const filtered = tasks.filter((task) => {
          const haystack = `${task.id} ${task.title} ${task.handoff_note} ${task.tags.join(" ")}`.toLowerCase();
          const matchesTag = !activeTag || task.tags.includes(activeTag);
          return matchesTag && (statusFilter === "all" || task.status === statusFilter) && haystack.includes(query.toLowerCase());
        });
        const byStatus = Object.keys(statusMeta).map((status) => ({ status, tasks: filtered.filter((task) => task.status === status) }));
        const inProgress = tasks.filter((task) => task.status === "in-progress").length;
        const blocked = tasks.filter((task) => task.status === "blocked").length;
        const needsHuman = tasks.filter((task) => task.status === "needs-human").length;
        const aiQueue = tasks.filter((task) => task.status === "needs-ai").length;
        const staleCount = tasks.filter((task) => hoursSince(task.updated_at) >= 72 && !["blocked", "done"].includes(task.status)).length;
        const statusCounts = Object.keys(statusMeta).reduce((acc, status) => {
          acc[status] = tasks.filter((task) => task.status === status).length;
          return acc;
        }, {});
        const executable = tasks
          .filter((task) => task.status === "needs-ai" && task.owner === "ai-batch")
          .sort((a, b) => Object.keys(priorityMeta).indexOf(a.priority) - Object.keys(priorityMeta).indexOf(b.priority))[0];

        function appendLog(message) {
          setLog((current) => [`11:30 ${message}`, ...current].slice(0, 8));
        }
        function handleLogin(event) {
          event.preventDefault();
          const normalizedId = loginId.trim().toLowerCase();
          const matchedProfile = members.find((item) => item.name.toLowerCase() === normalizedId || item.id.toLowerCase() === normalizedId);
          if (loginPassword === "panasonic" && matchedProfile) {
            setCurrentUserId(matchedProfile.id);
            setLoginId("");
            setLoginPassword("");
            setProfilePopup(null);
            setNavExpanded(false);
            appendLog(`login -> ${matchedProfile.name}`);
            return;
          }
          alert("IDまたはパスワードが違います");
        }
        function clampDetailWidth(width) {
          return Math.min(680, Math.max(320, Math.round(width)));
        }
        function startDetailResize(event) {
          if (event.button !== undefined && event.button !== 0) return;
          event.preventDefault();
          event.stopPropagation();
          setDetailOpen(true);
          const startX = event.clientX;
          const startWidth = detailWidth;
          const previousCursor = document.body.style.cursor;
          const previousSelect = document.body.style.userSelect;
          document.body.style.cursor = "col-resize";
          document.body.style.userSelect = "none";
          function handleMove(moveEvent) {
            setDetailWidth(clampDetailWidth(startWidth - (moveEvent.clientX - startX)));
          }
          function handleUp() {
            document.body.style.cursor = previousCursor;
            document.body.style.userSelect = previousSelect;
            window.removeEventListener("pointermove", handleMove);
            window.removeEventListener("pointerup", handleUp);
            window.removeEventListener("pointercancel", handleUp);
          }
          window.addEventListener("pointermove", handleMove);
          window.addEventListener("pointerup", handleUp);
          window.addEventListener("pointercancel", handleUp);
        }
        function selectTagFilter(tag) {
          setActiveTag(tag);
          setStatusFilter("all");
          setQuery("");
          appendLog(`filter tag -> ${tag}`);
        }
        function changeViewMode(mode) {
          setViewMode(mode);
          if (mode === "board") setActiveMenu("work");
          if (mode === "list") setActiveMenu("work");
          if (mode === "shop") setActiveMenu("store");
          if (mode === "shop") {
            setStatusFilter("all");
            setActiveTag("");
            setQuery("");
          }
        }
        function goBoardHome() {
          setViewMode("board");
          setStatusFilter("all");
          setActiveTag("");
          setQuery("");
          setDetailOpen(true);
          setActiveMenu("work");
          window.scrollTo({ top: 0, behavior: "smooth" });
          appendLog("home -> board");
        }
        function navigateAppMenu(item) {
          setActiveMenu(item.id);
          if (item.viewMode) {
            changeViewMode(item.viewMode);
            if (item.viewMode !== "shop") {
              setStatusFilter("all");
              setActiveTag("");
            }
            appendLog(`menu -> ${item.label}`);
            return;
          }
          appendLog(`menu pending -> ${item.label}`);
        }
        function selectProject(projectId, nextTab = "board") {
          const nextProject = projects.find((project) => project.id === projectId);
          if (!nextProject) return;
          setCurrentProjectId(projectId);
          setActiveMenu("work");
          setViewMode("board");
          setStatusFilter("all");
          setActiveTag("");
          setQuery("");
          setDetailOpen(true);
          setSelectedId(seedTasks[0].id);
          appendLog(`project -> ${nextProject.name}`);
        }
        function filterByStatus(status) {
          setStatusFilter(status);
          setActiveTag("");
          setQuery("");
          if (viewMode === "shop") setViewMode("board");
          setActiveMenu("work");
          appendLog(`filter status -> ${statusMeta[status]?.label || status}`);
        }
        function openMobileTask(id) {
          setSelectedId(id);
          setMobileSheetOpen(true);
          setActiveBottomNav("board");
        }
        function shopAppliedTag(item) {
          if (item.type === "skills") return "外部スキル";
          if (item.type === "commons") return "コモンズ";
          return "スタンプ";
        }
        function purchaseShopItem(item) {
          if (!item) return;
          const alreadyOwned = shopPurchases.includes(item.id);
          if (!alreadyOwned) {
            setShopPurchases((current) => [...current, item.id]);
          }
          if (selected && !alreadyOwned) {
            const tag = shopAppliedTag(item);
            setTasks((current) => current.map((task) => task.id === selected.id ? {
              ...task,
              tags: [...new Set([...task.tags, tag])],
              comments_count: task.comments_count + 1,
              updated_at: now.toISOString(),
              activity: [{ timestamp: now.toISOString(), actor: "shop", action: `ストア購入: ${item.name}` }, ...task.activity],
            } : task));
          }
          appendLog(`${alreadyOwned ? "SHOP owned" : "SHOP purchase"} -> ${item.name}`);
        }
        function sendStamp(item, emote) {
          if (!item || !emote) return;
          if (!shopPurchases.includes(item.id)) return appendLog(`stamp locked -> ${item.name}`);
          if (!selected) return appendLog("stamp target not found");
          setTasks((current) => current.map((task) => task.id === selected.id ? {
            ...task,
            thanks_count: task.thanks_count + emote.points,
            updated_at: now.toISOString(),
            activity: [{ timestamp: now.toISOString(), actor: "shop", action: `${item.name} ${emote.points}Pointを送信` }, ...task.activity],
          } : task));
          appendLog(`stamp ${emote.points}P -> ${selected.id}`);
        }
        function addCommentStamp(taskId, commentIndex, emote) {
          if (!taskId || !emote) return;
          setTasks((current) => current.map((task) => {
            if (task.id !== taskId) return task;
            const currentReactions = task.comment_reactions || {};
            const commentReactions = currentReactions[commentIndex] || [];
            return {
              ...task,
              thanks_count: task.thanks_count + emote.points,
              comment_reactions: {
                ...currentReactions,
                [commentIndex]: [
                  ...commentReactions,
                  {
                    packId: emote.packId,
                    packName: emote.packName,
                    icon: emote.icon,
                    points: emote.points,
                  },
                ],
              },
              updated_at: now.toISOString(),
              activity: [{ timestamp: now.toISOString(), actor: "shop", action: `コメント${commentIndex + 1}へ${emote.icon} ${emote.points}Pointを追加` }, ...task.activity],
            };
          }));
          appendLog(`comment stamp ${emote.points}P -> ${taskId}#${commentIndex + 1}`);
        }
        function handleProfileClickCapture(event) {
          if (navExpanded && !event.target.closest("[data-app-sidebar]")) {
            setNavExpanded(false);
          }
          if (event.target.closest("[data-profile-popover]")) return;
          const trigger = event.target.closest("[data-profile-id]");
          if (!trigger) {
            setProfilePopup(null);
            return;
          }
          const memberId = trigger.dataset.profileId;
          const rect = trigger.getBoundingClientRect();
          const left = Math.min(window.innerWidth - 336, Math.max(12, rect.right - 320));
          const maxTop = Math.max(12, window.innerHeight - 385);
          const top = Math.min(maxTop, Math.max(72, rect.bottom + 8));
          event.stopPropagation();
          setProfilePopup((current) => current?.memberId === memberId ? null : { memberId, left, top });
        }
        function patchTask(id, patch, action = "更新") {
          setTasks((current) => current.map((task) => task.id === id ? { ...task, ...patch, updated_at: now.toISOString(), activity: [{ timestamp: now.toISOString(), actor: "human", action }, ...task.activity] } : task));
          appendLog(`PATCH /api/board/${id} -> ${action}`);
        }
        function addTask() {
          const title = draftTitle.trim();
          if (!title) return;
          const id = nextId(tasks, archive);
          const newTask = {
            id, title, status: "needs-ai", owner: "ai-batch", priority: draftPriority, action_type: "other",
            handoff_note: "人間がワークを投入済み。次はAIが実行可能な最小ステップに分解し、完了後に人間へ確認ポイントを返す。",
            blocked_reason: null, assignees: [...new Set([currentUser?.id || "entaka", "ken"])], comments_count: 0, thanks_count: 0, tags: ["新規", "未分類"],
            created_at: now.toISOString(), updated_at: now.toISOString(),
            activity: [{ timestamp: now.toISOString(), actor: currentUser?.name || "human", action: "ワークを作成" }],
          };
          setTasks((current) => [newTask, ...current]);
          setSelectedId(id);
          setDraftTitle("");
          setStatusFilter("all");
          appendLog(`POST /api/board -> ${id}`);
        }
        function runDispatcher() {
          if (!executable) return appendLog("dispatcher -> executable task not found");
          patchTask(executable.id, {
            status: "needs-human",
            owner: "human",
            handoff_note: "Claude Codeが優先度順に1件だけ処理した想定。次は人間が成果物の正しさ、公開可否、追加判断の有無を確認する。",
          }, "ディスパッチャーが1件処理");
          setSelectedId(executable.id);
        }
        function detectStale() {
          let changed = 0;
          setTasks((current) => current.map((task) => {
            if (hoursSince(task.updated_at) < 72 || ["blocked", "done"].includes(task.status)) return task;
            changed += 1;
            return { ...task, status: "blocked", blocked_reason: "72時間変化なし", updated_at: now.toISOString(), activity: [{ timestamp: now.toISOString(), actor: "ai-batch", action: "72時間停滞を検知" }, ...task.activity] };
          }));
          appendLog(`stale-check -> ${changed} blocked`);
        }
        function completeTask(id) {
          const task = tasks.find((item) => item.id === id);
          if (!task) return;
          setTasks((current) => current.map((item) => item.id === id ? {
            ...item,
            status: "done",
            blocked_reason: null,
            updated_at: now.toISOString(),
            activity: [{ timestamp: now.toISOString(), actor: "human", action: "完了列へ移動" }, ...item.activity],
          } : item));
          setSelectedId(id);
          appendLog(`PATCH /api/board/${id} -> done column`);
        }
        function addComment(id, body) {
          const text = body.trim();
          if (!text) return;
          setTasks((current) => current.map((task) => {
            if (task.id !== id) return task;
            const nextComments = [
              ...(task.comments || []),
              { author: currentUser?.id || "entaka", timestamp: "6/1 11:30", body: text },
            ];
            return {
              ...task,
              comments: nextComments,
              comments_count: Math.max((task.comments_count || 0) + 1, nextComments.length),
              updated_at: now.toISOString(),
              activity: [{ timestamp: now.toISOString(), actor: currentUser?.name || "human", action: "コメントを追加" }, ...task.activity],
            };
          }));
          appendLog(`comment -> ${id}`);
        }

        if (!currentUser) {
          return (
            <LoginScreen
              loginId={loginId}
              loginPassword={loginPassword}
              onIdChange={setLoginId}
              onPasswordChange={setLoginPassword}
              onSubmit={handleLogin}
            />
          );
        }

        return (
          <main onClickCapture={handleProfileClickCapture} className="min-h-screen bg-[#f8fafd] text-[#202124]">
            <FloatingProfilePopover profile={profilePopup} tasks={tasks} requests={helpRequests} />
            <section className="flex min-h-screen">
              <AppSidebar
                expanded={navExpanded}
                activeMenu={activeMenu}
                currentProjectId={currentProjectId}
                onToggle={() => setNavExpanded((value) => !value)}
                onNavigate={navigateAppMenu}
                onProjectSelect={selectProject}
              />
              <section className="flex min-w-0 flex-1 flex-col">
              <header className="sticky top-0 z-30 flex min-h-16 flex-col gap-3 border-b border-[#e8eaed] bg-[#f8fafd]/95 px-4 py-3 backdrop-blur lg:flex-row lg:items-center">
                <div className="flex min-w-[292px] flex-wrap items-center gap-3">
                  <button
                    type="button"
                    onClick={goBoardHome}
                    className="flex items-center gap-3 rounded-2xl px-2 py-1 text-left transition hover:bg-[#e8eaed]/70 focus:outline-none focus:ring-2 focus:ring-[#d2e3fc]"
                    title="カンバンボードへ戻る"
                  >
                    <div className="grid h-11 w-11 place-items-center"><DWorksLogo className="h-11 w-11" /></div>
                    <div><h1 className="text-xl font-normal tracking-normal text-[#3c4043]">.d works</h1><p className="hidden text-xs text-[#5f6368] sm:block">AI Cowork Operations</p></div>
                  </button>
                  <div className="min-w-0 border-l border-[#dadce0] pl-3">
                    <div className="text-[11px] font-medium leading-4 text-[#5f6368]">現在のプロジェクト</div>
                    <div className="mt-0.5 flex min-w-0 items-center gap-2">
                      <h2 className="truncate text-lg font-normal leading-6 text-[#202124]">{currentProjectName}</h2>
                      <Icon name="star" className="h-4 w-4 shrink-0 text-[#fbbc04]" />
                    </div>
                  </div>
                </div>
                <div className="flex min-w-0 flex-1 items-center gap-3 rounded-full bg-[#edf2fa] px-4 py-2 transition focus-within:bg-white focus-within:shadow-[0_1px_6px_rgba(60,64,67,.28)] lg:max-w-[720px]">
                  <Icon name="search" className="h-5 w-5 shrink-0 text-[#5f6368]" />
                  <input value={query} onChange={(event) => setQuery(event.target.value)} placeholder={viewMode === "shop" ? "ストア内を検索" : "ワーク、タグ、引継ぎノートを検索"} className="min-w-0 flex-1 bg-transparent text-sm text-[#202124] outline-none placeholder:text-[#5f6368]" />
                </div>
                <div className="grid grid-cols-2 gap-2 sm:grid-cols-4 lg:ml-auto">
                  <Metric label="進行中ワーク" value={inProgress} icon="play" active={statusFilter === "in-progress"} onClick={() => filterByStatus("in-progress")} />
                  <Metric label="AI待ち" value={aiQueue} icon="bot" active={statusFilter === "needs-ai"} onClick={() => filterByStatus("needs-ai")} />
                  <Metric label="人間待ち" value={needsHuman} icon="user" active={statusFilter === "needs-human"} onClick={() => filterByStatus("needs-human")} />
                  <Metric label="停滞" value={blocked} icon="alert" danger={blocked > 0} active={statusFilter === "blocked"} onClick={() => filterByStatus("blocked")} />
                </div>
                <div className="flex items-center gap-2 rounded-full bg-white px-3 py-2 shadow-sm ring-1 ring-[#e8eaed]" title="共有メンバー">
                  <div className="flex -space-x-2">
                    {visibleMembers.map((m) => <Avatar key={m.id} id={m.id} size="md" />)}
                    {extraMemberCount > 0 && <span className="inline-grid h-8 w-8 place-items-center rounded-full bg-[#f1f3f4] text-xs font-semibold text-[#5f6368] ring-2 ring-white">+{extraMemberCount}</span>}
                  </div>
                  <span className="hidden text-xs font-medium text-[#5f6368] sm:inline">{members.length}人で共有</span>
                </div>
                <button
                  onClick={() => setDetailOpen((value) => !value)}
                  aria-pressed={detailOpen}
                  title={detailOpen ? "右カラムを閉じる" : "右カラムを開く"}
                  className={cn(
                    "grid h-11 w-11 place-items-center rounded-full bg-white text-[#5f6368] shadow-sm ring-1 ring-[#e8eaed] transition hover:bg-[#f8fafd] hover:text-[#202124]",
                    detailOpen ? "text-[#1967d2] ring-[#d2e3fc]" : ""
                  )}
                >
                  <Icon name="panel" className="h-5 w-5" />
                </button>
                <ProfileMenu memberId={currentUser.id} />
              </header>

              {viewMode !== "shop" && !detailOpen && (
                <button
                  onClick={() => setDetailOpen(true)}
                  title="右カラムを開く"
                  className="fixed right-4 top-28 z-40 hidden h-11 w-11 place-items-center rounded-full border border-[#dadce0] bg-white text-[#1967d2] shadow-[0_4px_12px_rgba(60,64,67,.14)] transition hover:bg-[#e8f0fe] xl:grid"
                >
                  <Icon name="panel" className="h-5 w-5" />
                </button>
              )}

              <section
                className={cn("work-layout grid flex-1 gap-4 p-4", showTaskDetail ? "" : "detail-closed")}
                style={{ "--detail-width": `${detailWidth}px` }}
              >
                <aside className="flex flex-col gap-3">
                  <button onClick={() => (draftTitle.trim() ? addTask() : setDraftTitle("新規ワーク: "))} className="mb-1 inline-flex h-14 w-fit items-center gap-3 rounded-2xl bg-white px-6 text-sm font-medium text-[#3c4043] shadow-sm ring-1 ring-[#e8eaed] transition hover:bg-[#f8fafd]">
                    <Icon name="plus" className="h-5 w-5 text-[#1a73e8]" />新規ワーク作成
                  </button>
                  <div className="rounded-3xl border border-[#e8eaed] bg-white p-3 shadow-sm">
                    <div className="flex items-center justify-between"><div className="flex items-center gap-2 text-sm font-medium text-[#202124]"><Icon name="plus" className="h-4 w-4" />ワーク追加</div><Chip className="bg-[#e8f0fe] text-[#1967d2]">mock API</Chip></div>
                    <div className="mt-3 flex gap-2">
                      <input value={draftTitle} onChange={(event) => setDraftTitle(event.target.value)} onKeyDown={(event) => event.key === "Enter" && addTask()} placeholder="AIに渡す仕事を追加" className="min-w-0 flex-1 rounded-full border border-transparent bg-[#f1f3f4] px-4 py-2 text-sm outline-none transition focus:bg-white focus:shadow-[0_1px_4px_rgba(60,64,67,.24)]" />
                      <select value={draftPriority} onChange={(event) => setDraftPriority(event.target.value)} className="rounded-full border border-[#dadce0] bg-white px-3 text-sm text-[#3c4043]">{Object.keys(priorityMeta).map((key) => <option key={key}>{key}</option>)}</select>
                      <IconButton title="ワークを追加" onClick={addTask}><Icon name="plus" className="h-4 w-4" /></IconButton>
                    </div>
                  </div>
                  <HelpRequestList requests={helpRequests} selectedId={selectedId} onSelect={setSelectedId} />
                  <div className="rounded-3xl border border-[#e8eaed] bg-white p-3 shadow-sm">
                    <div className="flex items-center gap-2 text-sm font-medium text-[#202124]"><Icon name="shield" className="h-4 w-4" />AI安全ルール</div>
                    <div className="mt-3 space-y-2 text-sm text-[#5f6368]">
                      <Rule icon="lock" text="X-Board-Token必須。主体別トークンでログ追跡。" />
                      <Rule icon="clock" text="72時間変化なしならblockedへ。" />
                    </div>
                  </div>
                  <div className="rounded-3xl border border-[#e8eaed] bg-white p-3 shadow-sm">
                    <div className="mb-3 flex items-center justify-between"><div className="flex items-center gap-2 text-sm font-medium text-[#202124]"><Icon name="bot" className="h-4 w-4" />AI自動処理</div><button onClick={runDispatcher} className="inline-flex items-center gap-2 rounded-full bg-[#1a73e8] px-4 py-2 text-sm font-medium text-white shadow-sm transition hover:bg-[#1967d2]"><Icon name="play" className="h-4 w-4" />1件実行</button></div>
                    <div className="rounded-2xl bg-[#f8fafd] p-3"><div className="text-xs font-medium text-[#5f6368]">Next executable</div><div className="mt-1 text-sm font-medium text-[#202124]">{executable ? `${executable.id} ${executable.title}` : "対象ワークなし"}</div><div className="mt-2 text-xs text-[#5f6368]">P0から順に、1件だけ処理。</div></div>
                    <button onClick={detectStale} className="mt-2 inline-flex w-full items-center justify-center gap-2 rounded-full border border-[#dadce0] bg-white px-3 py-2 text-sm font-medium text-[#3c4043] transition hover:bg-[#f8fafd]"><Icon name="refresh" className="h-4 w-4" />72h停滞チェック {staleCount > 0 ? `(${staleCount})` : ""}</button>
                  </div>
                  <div className="rounded-3xl border border-[#e8eaed] bg-white p-3 text-[#202124] shadow-sm">
                    <div className="flex items-center gap-2 text-sm font-semibold"><Icon name="history" className="h-4 w-4 text-[#5f6368]" />操作履歴</div>
                    <div className="mt-3 space-y-2 font-mono text-xs text-[#5f6368]">{log.map((item, index) => <div key={`${item}-${index}`} className="truncate rounded-xl bg-[#f8fafd] px-2 py-1.5">{item}</div>)}</div>
                  </div>
                </aside>

                <section className="min-w-0 overflow-hidden rounded-[28px] border border-[#e8eaed] bg-white p-3 shadow-sm">
                  <div className="flex flex-col gap-3 rounded-2xl border border-[#e8eaed] bg-[#f8fafd] p-2 xl:flex-row xl:items-center">
                    <div className="shrink-0">
                      <ViewModeSwitch viewMode={viewMode} onChange={changeViewMode} />
                    </div>
                    <div className="hidden min-w-[240px] flex-1 items-center gap-2 rounded-full bg-white px-4 py-2 ring-1 ring-[#e8eaed] sm:flex">
                      <Icon name="search" className="h-4 w-4 shrink-0 text-[#5f6368]" />
                      <input value={query} onChange={(event) => setQuery(event.target.value)} placeholder={viewMode === "shop" ? "スキル、コモンズ、スタンプを検索" : "ID、タグ、ワーク名を検索"} className="min-w-0 flex-1 bg-transparent text-sm outline-none" />
                    </div>
                    {viewMode !== "shop" && (
                      <div className="flex shrink-0 items-center gap-1 overflow-x-auto rounded-full bg-white p-1 ring-1 ring-[#e8eaed]">
                        <IconButton title="すべて" active={statusFilter === "all"} onClick={() => setStatusFilter("all")}><Icon name="filter" className="h-4 w-4" /></IconButton>
                        {Object.entries(statusMeta).map(([key, meta]) => <IconButton key={key} title={meta.label} active={statusFilter === key} onClick={() => setStatusFilter(key)}><Icon name={meta.icon} className="h-4 w-4" /></IconButton>)}
                      </div>
                    )}
                  </div>
                  {activeTag && (
                    <div className="mt-3 flex flex-wrap items-center gap-2 rounded-2xl bg-[#e8f0fe] px-3 py-2 text-sm text-[#1967d2]">
                      <Icon name="filter" className="h-4 w-4 shrink-0" />
                      <span className="font-medium">ワークタグ: {activeTag}</span>
                      <span className="text-xs text-[#5f6368]">{filtered.length}件表示中</span>
                      <button onClick={() => setActiveTag("")} className="ml-auto rounded-full px-3 py-1 text-xs font-medium text-[#1967d2] transition hover:bg-white/70">解除</button>
                    </div>
                  )}
                  {viewMode === "board" && (
                    <div className="mt-4 overflow-x-auto">
                      <div className="grid min-w-[1380px] items-start gap-3 lg:grid-cols-[repeat(6,minmax(220px,1fr))]">{byStatus.map(({ status, tasks }) => <Column key={status} status={status} tasks={tasks} selectedId={selectedId} onSelect={setSelectedId} />)}</div>
                    </div>
                  )}
                  {viewMode === "list" && <ListView tasks={filtered} selectedId={selectedId} onSelect={setSelectedId} />}
                  {viewMode === "gantt" && <GanttView tasks={filtered} selectedId={selectedId} onSelect={setSelectedId} />}
                  {viewMode === "shop" && <ShopView query={query} selectedTask={selected} ownedItems={shopPurchases} onPurchase={purchaseShopItem} onSendStamp={sendStamp} />}
                </section>

                {showTaskDetail && (
                  <aside className="relative min-w-0 rounded-[28px] border border-[#e8eaed] bg-white shadow-sm">
                    <button
                      onPointerDown={startDetailResize}
                      title="右カラムの幅を調整"
                      aria-label="右カラムの幅を調整"
                      className="group absolute -left-2 top-0 z-20 hidden h-full w-4 cursor-col-resize items-stretch justify-center xl:flex"
                    >
                      <span className="my-6 block w-1 rounded-full bg-[#e8eaed] transition group-hover:bg-[#d2e3fc]" />
                    </button>
                    {selected ? (
                      <Detail
                        task={selected}
                        activeTag={activeTag}
                        onTagSelect={selectTagFilter}
                        onPatch={patchTask}
                        onComplete={completeTask}
                        ownedStampItems={shopCatalog.stamps.filter((item) => shopPurchases.includes(item.id))}
                        onAddCommentStamp={addCommentStamp}
                      />
                    ) : <div className="p-5 text-sm text-neutral-500">ワークがありません。</div>}
                  </aside>
                )}
              </section>
            </section>
            </section>
          </main>
        );
      }

      function Rule({ icon, text }) {
        return <div className="flex gap-2"><Icon name={icon} className="mt-0.5 h-4 w-4 shrink-0 text-[#1a73e8]" /><span>{text}</span></div>;
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
